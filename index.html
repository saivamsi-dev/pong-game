<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: black;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id=\"pongCanvas\" width=\"800\" height=\"400\"></canvas>\n    <script>\n        const canvas = document.getElementById(\"pongCanvas\");\n        const context = canvas.getContext(\"2d\");\n        const paddleWidth = 10, paddleHeight = 100;\n        const ballSize = 10;\n        let playerPaddleY = (canvas.height - paddleHeight) / 2;\n        let aiPaddleY = (canvas.height - paddleHeight) / 2;\n        let ballX = canvas.width / 2, ballY = canvas.height / 2;\n        let ballSpeedX = 5, ballSpeedY = 5;\n        let playerScore = 0, aiScore = 0;\n        \n        function draw() {\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw paddles and ball\n            context.fillStyle = 'white';\n            context.fillRect(0, playerPaddleY, paddleWidth, paddleHeight);\n            context.fillRect(canvas.width - paddleWidth, aiPaddleY, paddleWidth, paddleHeight);\n            context.beginPath();\n            context.arc(ballX, ballY, ballSize, 0, Math.PI * 2);\n            context.fill();\n            // Draw scores\n            context.font = '16px Arial';\n            context.fillText(playerScore, canvas.width / 4, 20);\n            context.fillText(aiScore, canvas.width * 3 / 4, 20);\n        }\n        \n        function update() {\n            ballX += ballSpeedX;\n            ballY += ballSpeedY;\n            // Ball collision with top and bottom\n            if (ballY + ballSize > canvas.height || ballY - ballSize < 0) {\n                ballSpeedY = -ballSpeedY;\n            }\n            // Ball collision with paddles\n            if (ballX - ballSize < paddleWidth) {\n                if (ballY > playerPaddleY && ballY < playerPaddleY + paddleHeight) {\n                    ballSpeedX = -ballSpeedX;                } else {\n                    aiScore++;\n                    resetBall();\n                }\n            } else if (ballX + ballSize > canvas.width - paddleWidth) {\n                if (ballY > aiPaddleY && ballY < aiPaddleY + paddleHeight) {\n                    ballSpeedX = -ballSpeedX;                } else {\n                    playerScore++;\n                    resetBall();\n                }\n            }\n            // AI paddle movement\n            aiPaddleY += (ballY - (aiPaddleY + paddleHeight / 2)) * 0.1;\n            aiPaddleY = Math.max(Math.min(aiPaddleY, canvas.height - paddleHeight), 0);\n        }\n        \n        function resetBall() {\n            ballX = canvas.width / 2;\n            ballY = canvas.height / 2;\n            ballSpeedX = -ballSpeedX;\n            ballSpeedY = 5 * (Math.random() > 0.5 ? 1 : -1);\n        }\n        \n        function gameLoop() {\n            draw();\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n        \n        document.addEventListener(\"mousemove\", (event) => {\n            const rect = canvas.getBoundingClientRect();\n            const mouseY = event.clientY - rect.top;\n            playerPaddleY = mouseY - paddleHeight / 2;\n            playerPaddleY = Math.max(Math.min(playerPaddleY, canvas.height - paddleHeight), 0);\n        });\n        document.addEventListener(\"keydown\", (event) => {\n            if (event.key === 'ArrowUp') {\n                playerPaddleY -= 20;\n            } else if (event.key === 'ArrowDown') {\n                playerPaddleY += 20;\n            }\n            playerPaddleY = Math.max(Math.min(playerPaddleY, canvas.height - paddleHeight), 0);\n        });\n        gameLoop();\n    </script>\n</body>\n</html>\n
